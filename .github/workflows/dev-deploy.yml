name: Dev Deploy - JAR Direct

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04

    steps:
      # ✅ 1. 소스코드 체크아웃
      - name: Checkout Repository
        uses: actions/checkout@v3

      # ✅ 2. JDK 17 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ 3. Gradle 빌드 (테스트 제외)
      - name: Build Spring Boot project
        run: ./gradlew clean build -x test

      # ✅ 4. JAR + .env 파일 tar.gz로 묶기
      - name: Package JAR and .env into tar.gz
        run: |
          echo "Creating .env file..."
          echo "DATASOURCE_URL=${{ secrets.DATASOURCE_URL }}" >> .env
          echo "DATASOURCE_USERNAME=${{ secrets.DATASOURCE_USERNAME }}" >> .env
          echo "DATASOURCE_PASSWORD=${{ secrets.DATASOURCE_PASSWORD }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "AWS_CREDENTIALS_ACCESS=${{ secrets.AWS_CREDENTIALS_ACCESS }}" >> .env
          echo "AWS_CREDENTIALS_SECRET=${{ secrets.AWS_CREDENTIALS_SECRET }}" >> .env
          echo "AWS_BUCKET=${{ secrets.AWS_BUCKET }}" >> .env
          echo "UTIL_SECRET=${{ secrets.UTIL_SECRET }}" >> .env

          echo "Finding latest JAR..."
          JAR_PATH=$(find build/libs -name "*.jar" ! -name "*plain.jar" -printf "%T@ %p\n" | sort -n | tail -1 | awk '{print $2}')

          if [ -z "$JAR_PATH" ]; then
            echo "❌ No deployable JAR found!"
            exit 1
          fi

          echo "✅ Found JAR: $JAR_PATH"
          mkdir -p deploy_bundle
          cp "$JAR_PATH" deploy_bundle/
          cp .env deploy_bundle/
          tar -zcf bundle.tar.gz -C deploy_bundle .

      # ✅ 5. tar.gz 파일 서버 전송
      - name: Copy archive to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER_NAME }}
          key: ${{ secrets.SERVER_KEY }}
          source: bundle.tar.gz
          target: "~/app"
          debug: true

      # ✅ 6. 서버에서 압축 해제 + 앱 재시작
      - name: Restart Spring Boot app on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER_NAME }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            mkdir -p ~/app
            cd ~/app
            
            echo "--- Unpacking bundle ---"
            tar -zxf bundle.tar.gz
            
            DEPLOYABLE_JAR_NAME=$(ls -t *.jar | head -n 1)
            
            if [ -z "$DEPLOYABLE_JAR_NAME" ]; then
              echo "❌ Error: No JAR file found."
              exit 1
            fi
            
            echo "✅ Target JAR: $DEPLOYABLE_JAR_NAME"
            
            PID=$(ps aux | grep "java -jar $DEPLOYABLE_JAR_NAME" | grep -v grep | awk '{print $2}')
            if [ -n "$PID" ]; then
              echo "🛑 Stopping existing process (PID: $PID)..."
              kill -9 "$PID"
              sleep 5
            else
              echo "ℹ️ No existing process running."
            fi
            
            if [ -f .env ]; then
              echo "📦 Loading environment variables from .env..."
              while IFS='=' read -r key value
              do
                export "$key=$value"
              done < .env
              echo "✅ .env loaded."
            else
              echo "❌ Error: .env file not found!"
              exit 1
            fi
            
            echo "🚀 Starting application..."
            nohup java -jar "$DEPLOYABLE_JAR_NAME" > app.log 2>&1 &
            sleep 5
            
            echo "⏳ Waiting for application to become healthy..."
            for i in {1..15}; do
              if curl -fs http://localhost:8080/actuator/health; then
                echo "✅ Application is up!"
                break
              fi
              echo "⌛ Attempt $i failed. Retrying in 5 seconds..."
              sleep 5
              if [ "$i" -eq 15 ]; then
                echo "❌ Application failed to start in time."
                echo "--- Last 50 lines of app.log ---"
                tail -n 50 app.log
                exit 1
              fi
            done
            
            echo "--- ✅ Deployment Finished Successfully ---"
