spring:
  application:
    name: hanjeonerp

  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: true

jwt:
  secret: ${JWT_SECRET}
  access-token-validity: 9000000  # 15분

aws:
  credentials:
    access: ${AWS_CREDENTIALS_ACCESS}
    secret: ${AWS_CREDENTIALS_SECRET}
  region:
    static: ap-northeast-2
  stack:
    auto: false
  bucket: ${AWS_BUCKET}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

util:
  secret: ${UTIL_SECRET}

springdoc:
  cache:
    disabled: false
  swagger-ui:
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    root: INFO
    # Spring Web (요청/응답, DispatcherServlet)
    org.springframework.web: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    # Spring Security (지금 제일 중요)
    org.springframework.security: DEBUG
    # CORS / Filter 흐름
    org.springframework.web.filter: DEBUG
    # JWT / 인증 관련 (패키지 기준)
    com.hanjeonerp.backend.module.auth: DEBUG
    # JPA / Hibernate
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
