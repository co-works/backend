name: Dev Deploy - JAR Direct

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04

    steps:
      # ✅ 1. 소스코드 체크아웃
      - name: Checkout Repository
        uses: actions/checkout@v3

      # ✅ 2. JDK 17 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ 3. Gradle로 Spring Boot 프로젝트 빌드
      - name: Build Spring Boot project
        run: ./gradlew clean build -x test

      # ✅ 3.5. 최신 JAR 파일 경로 추출
      - name: Set JAR path as environment variable
        id: jar-path
        run: |
          JAR_PATH=$(find build/libs -name "*.jar" ! -name "*plain.jar" ! -name "*-SNAPSHOT.jar" -printf "%T@ %p\n" | sort -n | tail -1 | awk '{print $2}')
          echo "jar=$JAR_PATH" >> $GITHUB_OUTPUT

      # ✅ 4. .env 파일 생성
      - name: Create .env file from secrets
        run: |
          echo "DATASOURCE_URL=${{ secrets.DATASOURCE_URL }}" >> .env
          echo "DATASOURCE_USERNAME=${{ secrets.DATASOURCE_USERNAME }}" >> .env
          echo "DATASOURCE_PASSWORD=${{ secrets.DATASOURCE_PASSWORD }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "AWS_CREDENTIALS_ACCESS=${{ secrets.AWS_CREDENTIALS_ACCESS }}" >> .env
          echo "AWS_CREDENTIALS_SECRET=${{ secrets.AWS_CREDENTIALS_SECRET }}" >> .env
          echo "AWS_BUCKET=${{ secrets.AWS_BUCKET }}" >> .env
          echo "Created .env file."

      # ✅ 5. JAR + .env 파일 서버 전송
      - name: Copy deployable JAR and .env to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER_NAME }}
          key: ${{ secrets.SERVER_KEY }}
          source: |
            ${{ steps.jar-path.outputs.jar }}
            .env
          target: "~/app"
          debug: true

      # ✅ 6. 서버에서 앱 재시작
      - name: Restart Spring Boot app on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER_NAME }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            cd ~/app

            echo "--- Server Deployment Script Started ---"

            DEPLOYABLE_JAR_NAME=$(ls -t *.jar | head -n 1)

            if [ -z "$DEPLOYABLE_JAR_NAME" ]; then
              echo "Error: No JAR file found."
              exit 1
            fi

            echo "Target JAR: $DEPLOYABLE_JAR_NAME"

            PID=$(ps aux | grep "java -jar $DEPLOYABLE_JAR_NAME" | grep -v grep | awk '{print $2}')

            if [ -n "$PID" ]; then
              echo "Stopping existing process (PID: $PID)..."
              kill -9 "$PID"
              sleep 5
            else
              echo "No existing process found."
            fi

            # 환경 변수 로딩 (공백 처리 안전)
            if [ -f .env ]; then
              echo "Loading environment variables..."
              while IFS='=' read -r key value
              do
                export "$key=$value"
              done < .env
              echo ".env loaded."
            else
              echo "Error: .env file not found!"
              exit 1
            fi

            echo "Starting application..."
            nohup java -jar "$DEPLOYABLE_JAR_NAME" > app.log 2>&1 &

            sleep 15
            echo "Checking application status..."
            curl -f http://localhost:8080/actuator/health || {
              echo "Application failed to start.";
              exit 1;
            }

            echo "--- Deployment Finished Successfully ---"
