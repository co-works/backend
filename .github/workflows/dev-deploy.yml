name: Dev Deploy

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04

    steps:
      # ✅ 1. 소스코드 체크아웃
      - name: Checkout Repository
        uses: actions/checkout@v3

      # ✅ 2. JDK 17 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ 3. Gradle로 Spring Boot 빌드 (실행 가능한 JAR 생성)
      - name: Build Spring Boot project
        run: ./gradlew clean build -x test

      # ✅ 4. .env 파일 생성 (Secrets에서)
      # .env 파일은 빌드된 JAR와 함께 전송될 수 있도록 프로젝트 루트에 생성
      - name: Create .env file from secrets
        run: |
          echo "DATASOURCE_URL=${{ secrets.DATASOURCE_URL }}" >> .env
          echo "DATASOURCE_USERNAME=${{ secrets.DATASOURCE_USERNAME }}" >> .env
          echo "DATASOURCE_PASSWORD=${{ secrets.DATASOURCE_PASSWORD }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "AWS_CREDENTIALS_ACCESS=${{ secrets.AWS_CREDENTIALS_ACCESS }}" >> .env
          echo "AWS_CREDENTIALS_SECRET=${{ secrets.AWS_CREDENTIALS_SECRET }}" >> .env
          echo "AWS_BUCKET=${{ secrets.AWS_BUCKET }}" >> .env

      # ✅ 5. 빌드된 JAR 및 .env 파일 서버로 전송
      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER_NAME }}
          key: ${{ secrets.SERVER_KEY }}
          # build/libs 폴더 내부에서 plain.jar 및 -plain.jar를 제외한 일반 JAR 파일을 선택
          # .env 파일은 루트에 있으므로 그대로 포함
          source: "build/libs/*[!plain].jar,.env"
          target: "~/app" # ~/app 폴더 바로 밑으로 복사되도록 target을 수정
          debug: true

      # ✅ 6. 서버에서 JAR 재시작 (기존 프로세스 종료 + 백그라운드 실행)
      - name: Restart Spring Boot app on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER_NAME }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            cd ~/app

            # 기존 Java 프로세스 종료 (안정성 강화)
            # pgrep -f로 해당 JAR 파일을 실행하는 프로세스만 정확히 종료
            JAR_NAME_TO_FIND=$(ls -t *.jar | grep -v 'plain' | head -n 1) # plain.jar 제외
            
            if [ -n "$JAR_NAME_TO_FIND" ]; then
              echo "Checking for existing process for $JAR_NAME_TO_FIND..."
              PID=$(pgrep -f "java -jar $JAR_NAME_TO_FIND")
              if [ -n "$PID" ]; then
                echo "Existing Java process found (PID: $PID) for $JAR_NAME_TO_FIND. Killing it..."
                kill -9 "$PID"
                sleep 5 # 프로세스가 완전히 종료될 때까지 잠시 대기
              else
                echo "No existing Java process found for $JAR_NAME_TO_FIND."
              fi
            else
              echo "No deployable JAR file found to check for existing process."
            fi

            # .env 파일에서 환경 변수 로드
            if [ -f .env ]; then
              export $(grep -v '^#' .env | xargs)
              echo ".env file loaded."
            else
              echo "Warning: .env file not found. Environment variables might not be set."
            fi

            # 실행할 JAR 파일 선택: plain.jar, -plain.jar, -SNAPSHOT.jar 제외
            # ls -t : 최신 수정일 순 정렬
            # grep -v 'plain' : 'plain'이 들어간 파일 제외
            # grep -v 'SNAPSHOT' : 'SNAPSHOT'이 들어간 파일 제외 (프로덕션 배포가 아니더라도 dev 환경에서 명확성을 위해)
            # head -n 1 : 첫 번째 결과 (가장 최신) 선택
            JAR_FILE=$(ls -t *.jar | grep -v 'plain' | grep -v 'SNAPSHOT' | head -n 1)
            
            if [ -z "$JAR_FILE" ]; then
              echo "Error: No deployable JAR file found in ~/app after filtering. Check your build and copy steps."
              exit 1
            fi

            echo "Starting $JAR_FILE in background..."
            # nohup으로 백그라운드 실행 및 로그 리다이렉션
            nohup java -jar "$JAR_FILE" > app.log 2>&1 &

            echo "Application startup command executed. Waiting for a few seconds..."
            sleep 10 # 앱이 완전히 시작될 때까지 충분히 대기
            echo "Deployment script finished."