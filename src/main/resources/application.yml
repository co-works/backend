spring:
  application:
    name: hanjeonerp

  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

jwt:
  secret: ${JWT_SECRET}
  access-token-validity: 9000000  # 15분

aws:
  credentials:
    access: ${AWS_CREDENTIALS_ACCESS}
    secret: ${AWS_CREDENTIALS_SECRET}
  region:
    static: ap-northeast-2
  stack:
    auto: false
  bucket: ${AWS_BUCKET}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always